name: singup_page
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.15.2
  firebase_storage: ^12.3.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.4
  just_audio: ^0.9.42
  audio_session: ^0.1.17
  path_provider: ^2.1.3
  dio: ^5.4.0               # download files
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.5.1              # unique IDs for downloads
  image_picker: ^1.0.4      # pick images for albums
  palette_generator: ^0.3.3+4  # extract colors from images

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/images/
